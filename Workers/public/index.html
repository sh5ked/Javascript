<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers Management</title>
    <link rel="shortcut icon"
        href="https://p7.hiclipart.com/preview/6/794/571/computer-icons-user-customer-icon-design-user.jpg"
        type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Workers Management App</h1>
            <p>View and manage our enterprise workforce from the database</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalWorkers">0</div>
                <div class="label">Total Workers</div>
            </div>

            <div class="stat-card">
                <div class="number" id="average">-</div>
                <div class="label">Average Info</div>
            </div>
        </div>

        <section class="form-container">
            <h3>Add New Worker</h3>
            <form id="addUserForm">
                <input type="text" id="name" placeholder="Enter worker name" required>
                <input type="email" id="email" placeholder="Enter worker email" required>
                <input type="text" id="department" placeholder="Enter department" required>
                <input type="text" id="role" placeholder="Enter role" required>
                <input type="text" id="phone" placeholder="Enter phone number">

                <button type="submit" id="submitBtn">Add Worker ➕</button>
            </form>
        </section>

        <div id="workerGrid" class="grid"></div>
    </div>

    <script src="api.js"></script>
</body>

</html>
